# Conexion a PostgreSQL en servidor local
spring.datasource.url=jdbc:postgresql://localhost:5432/biblioteca
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate genera/actualiza las tablas automaticamente a partir de las entidades.
# update: crea lo que falta sin borrar datos existentes. Util durante el desarrollo del TP.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto de la aplicacion web
server.port=8080
