<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca del Instituto - Ingresar</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .pagina-login {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .contenido-login {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* Columna izquierda: imagen de fondo con texto superpuesto */
        .panel-imagen {
            flex: 1.3;
            position: relative;
            background-image: url('/images/login-biblioteca.avif');
            background-size: cover;
            background-position: center;
            color: #fff;
            display: flex;
            align-items: flex-end;
            padding: 40px;
        }
        .panel-imagen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(20,20,20,0.75) 0%, rgba(20,20,20,0.15) 55%, rgba(20,20,20,0) 100%);
        }
        .panel-imagen .texto-imagen {
            position: relative;
            z-index: 1;
            max-width: 520px;
        }
        .panel-imagen .texto-imagen .tarjeta-logo {
            display: inline-block;
            background: rgba(255,255,255,0.92);
            padding: 14px 20px;
            border-radius: 8px;
        }
        .panel-imagen .texto-imagen .tarjeta-logo img {
            display: block;
            max-width: 260px;
            width: 100%;
            height: auto;
        }
        .panel-imagen .texto-imagen p.subtitulo-imagen {
            margin: 12px 2px 0 2px;
            font-size: 22px;
            font-weight: 600;
        }

        /* Columna derecha: formulario de login */
        .panel-form {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 40px;
        }
        .caja-form {
            width: 100%;
            max-width: 340px;
        }
        .caja-form h1 {
            color: #2b3a42;
            margin-bottom: 4px;
        }
        .caja-form p.subtitulo {
            color: #6b6b63;
            margin-top: 0;
            margin-bottom: 24px;
        }
        label { display: block; margin-top: 14px; font-size: 14px; font-weight: 600; color: #2b3a42; }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            width: 100%;
            background: #c17f0a;
            color: #fff;
            border: none;
            padding: 11px 18px;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 22px;
        }
        .error { color: #b23b3b; margin-top: 12px; font-size: 14px; }

        /* Footer institucional */
        footer.footer-institucional {
            background: #2b3a42;
            color: #d9d7cd;
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13.5px;
        }
        footer.footer-institucional .logo-instituto img {
            height: 48px;
            display: block;
        }
        footer.footer-institucional .contacto-instituto {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        footer.footer-institucional a.contacto-mail {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #d9d7cd;
            text-decoration: none;
        }
        footer.footer-institucional a.contacto-mail:hover { color: #fff; }
        footer.footer-institucional .direccion {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 800px) {
            .contenido-login { flex-direction: column; }
            .panel-imagen { min-height: 220px; }
            footer.footer-institucional { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="pagina-login">
    <div class="contenido-login">
        <div class="panel-imagen">
            <div class="texto-imagen">
                <div class="tarjeta-logo">
                    <img th:src="@{/images/logo_juan23_azul.jpg}" alt="Instituto Superior Juan XXIII">
                </div>
                <p class="subtitulo-imagen">Biblioteca</p>
            </div>
        </div>

        <div class="panel-form">
            <div class="caja-form">
                <h1>Iniciar sesión</h1>
                <p class="subtitulo">Ingresá con tu DNI y contraseña.</p>

                <form th:action="@{/login}" method="post">
                    <label for="dni">DNI</label>
                    <input type="text" id="dni" name="dni" required autofocus>

                    <label for="contrasenia">Contraseña</label>
                    <input type="password" id="contrasenia" name="contrasenia" required>

                    <button type="submit">Ingresar</button>

                    <p class="error" th:if="${error}" th:text="${error}"></p>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer-institucional">
        <div class="logo-instituto">
            <img th:src="@{/images/logo_juan23_white-1.png}" alt="Instituto Juan XXIII">
        </div>
        <div class="contacto-instituto">
            <a class="contacto-mail" href="mailto:secretaria@juan23.edu.ar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 6h18v12H3V6z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                    <path d="M3 6l9 7 9-7" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                </svg>
                secretaria@juan23.edu.ar
            </a>
            <div class="direccion">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22s7-6.2 7-12a7 7 0 1 0-14 0c0 5.8 7 12 7 12z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                    <circle cx="12" cy="10" r="2.5" stroke="currentColor" stroke-width="1.6"/>
                </svg>
                <span>Vieytes 286, B8000 Bahía Blanca, Provincia de Buenos Aires, Argentina</span>
            </div>
        </div>
    </footer>
</div>
</body>
</html>
