<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - Panel Bibliotecario</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<header class="topbar">
    <span class="marca">Biblioteca del Instituto - Panel Bibliotecario</span>
    <div><a th:href="@{/logout}">Salir</a></div>
</header>
<main>
    <nav class="tabs">
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/admin/libros}">Libros</a>
        <a th:href="@{/admin/usuarios}" class="activo">Usuarios</a>
        <a th:href="@{/admin/prestamos}">Préstamos</a>
        <a th:href="@{/admin/vencidos}">Vencidos y sanciones</a>
        <a th:href="@{/admin/estadisticas}">Estadísticas</a>
    </nav>

    <div class="card">
        <h2>Usuarios</h2>
        <a class="btn" th:href="@{/admin/usuarios/nuevo}">+ Nuevo usuario</a>

        <table>
            <tr><th>Nombre</th><th>DNI</th><th>Tipo</th><th>Materia/Carrera</th><th>Bloqueado</th><th></th></tr>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.nombre + ' ' + u.apellido}"></td>
                <td th:text="${u.dni}"></td>
                <td th:text="${u.tipoUsuario}"></td>
                <td th:text="${u.materia}"></td>
                <td>
                    <span th:if="${u.bloqueado}" class="tag vencido">Sí</span>
                    <span th:unless="${u.bloqueado}" class="tag disponible">No</span>
                </td>
                <td>
                    <form th:action="@{/admin/usuarios/{id}/baja(id=${u.id})}" method="post">
                        <button type="submit" class="peligro">Dar de baja</button>
                    </form>
                </td>
            </tr>
        </table>
        <p th:if="${#lists.isEmpty(usuarios)}">No hay usuarios cargados.</p>
    </div>
</main>
</body>
</html>
