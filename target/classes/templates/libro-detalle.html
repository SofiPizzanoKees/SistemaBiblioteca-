<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${libro.titulo}">Libro</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<header class="topbar">
    <a class="marca" th:href="@{/catalogo}">Biblioteca del Instituto</a>
    <div>
        <a th:href="@{/catalogo}">Catálogo</a>
        <span class="dropdown-notif">
            <a href="#" class="notif-toggle" onclick="toggleNotif(event)">
                Notificaciones<span class="badge-notif" th:if="${notificacionesNoLeidas > 0}" th:text="${notificacionesNoLeidas}"></span>
            </a>
            <div class="menu-notif" id="menuNotif">
                <div th:each="n : ${notificacionesDropdown}" class="item-notif" th:classappend="${n.leida} ? 'leida' : 'no-leida'">
                    <a href="#" th:onclick="'marcarLeida(' + ${n.id} + ')'">
                        <span th:text="${n.mensaje}"></span>
                        <small th:text="${n.fecha}"></small>
                    </a>
                </div>
                <p th:if="${#lists.isEmpty(notificacionesDropdown)}" class="sin-notif">Sin notificaciones</p>
                <div class="borrar-historial" th:unless="${#lists.isEmpty(notificacionesDropdown)}">
                    <a href="#" onclick="borrarHistorial(event)">Borrar historial</a>
                </div>
            </div>
        </span>
        <a th:href="@{/mi-cuenta}">Mi cuenta</a>
        <a th:href="@{/logout}">Salir</a>
    </div>
</header>
<script th:inline="none">
    function toggleNotif(e) {
        e.preventDefault();
        document.getElementById('menuNotif').classList.toggle('abierto');
    }
    function marcarLeida(id) {
        fetch('/mi-cuenta/notificaciones/' + id + '/leer', { method: 'POST' })
            .then(() => location.reload());
    }
    function borrarHistorial(e) {
        e.preventDefault();
        fetch('/mi-cuenta/notificaciones/borrar', { method: 'POST' })
            .then(() => location.reload());
    }
    document.addEventListener('click', function (e) {
        if (!e.target.closest('.dropdown-notif')) {
            var menu = document.getElementById('menuNotif');
            if (menu) menu.classList.remove('abierto');
        }
    });
</script>
<main>
    <div class="card">
        <h2 th:text="${libro.titulo}"></h2>
        <p><strong>ISBN:</strong> <span th:text="${libro.isbn}"></span></p>
        <p><strong>Año:</strong> <span th:text="${libro.anio}"></span></p>
        <p><strong>Idioma:</strong> <span th:text="${libro.idioma}"></span></p>
        <p><strong>Categoría:</strong> <span th:text="${libro.categoria != null ? libro.categoria.nombre : '-'}"></span></p>
        <p><strong>Editorial:</strong> <span th:text="${libro.editorial != null ? libro.editorial.nombre : '-'}"></span></p>
        <p><strong>Autores:</strong>
            <span th:text="${#strings.setJoin(libro.autores.![nombre + ' ' + apellido], ', ')}"></span>
        </p>

        <p>
            <span th:if="${disponible}" class="tag disponible" th:text="'Disponible (' + ${ejemplaresDisponibles} + ' ejemplar/es)'"></span>
            <span th:unless="${disponible}" class="tag prestado">Sin ejemplares disponibles</span>
        </p>

        <p class="error" th:if="${error}" th:text="${error}"></p>

        <form th:if="${disponible}" th:action="@{/catalogo/{id}/prestamo(id=${libro.id})}" method="post">
            <button type="submit">Solicitar préstamo</button>
        </form>

        <form th:unless="${disponible}" th:action="@{/catalogo/{id}/reserva(id=${libro.id})}" method="post">
            <button type="submit">Reservar (me anoto en la fila de espera)</button>
        </form>
    </div>
</main>
</body>
</html>
