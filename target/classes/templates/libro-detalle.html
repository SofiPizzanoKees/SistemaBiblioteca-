<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${libro.titulo}">Libro</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<header class="topbar">
    <span class="marca">Biblioteca del Instituto</span>
    <div>
        <a th:href="@{/catalogo}">Catálogo</a>
        <a th:href="@{/mi-cuenta}">Mi cuenta</a>
        <a th:href="@{/logout}">Salir</a>
    </div>
</header>
<main>
    <div class="card">
        <h2 th:text="${libro.titulo}"></h2>
        <p><strong>ISBN:</strong> <span th:text="${libro.isbn}"></span></p>
        <p><strong>Año:</strong> <span th:text="${libro.anio}"></span></p>
        <p><strong>Idioma:</strong> <span th:text="${libro.idioma}"></span></p>
        <p><strong>Categoría:</strong> <span th:text="${libro.categoria != null ? libro.categoria.nombre : '-'}"></span></p>
        <p><strong>Editorial:</strong> <span th:text="${libro.editorial != null ? libro.editorial.nombre : '-'}"></span></p>
        <p><strong>Autores:</strong>
            <span th:text="${#strings.setJoin(libro.autores.![nombre + ' ' + apellido], ', ')}"></span>
        </p>

        <p>
            <span th:if="${disponible}" class="tag disponible" th:text="'Disponible (' + ${ejemplaresDisponibles} + ' ejemplar/es)'"></span>
            <span th:unless="${disponible}" class="tag prestado">Sin ejemplares disponibles</span>
        </p>

        <p class="error" th:if="${error}" th:text="${error}"></p>

        <form th:if="${disponible}" th:action="@{/catalogo/{id}/prestamo(id=${libro.id})}" method="post">
            <button type="submit">Solicitar préstamo</button>
        </form>

        <form th:unless="${disponible}" th:action="@{/catalogo/{id}/reserva(id=${libro.id})}" method="post">
            <button type="submit">Reservar (me anoto en la fila de espera)</button>
        </form>
    </div>
</main>
</body>
</html>
